name: Qwen Telegram Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies (with optimized llama-cpp-python)
        run: |
          pip install python-telegram-bot requests
          CMAKE_ARGS="-DLLAMA_AVX2=on -DLLAMA_FMA=on -DLLAMA_BLIS=on" pip install llama-cpp-python
          
      - name: Cache model
        uses: actions/cache@v4
        with:
          path: ./model.gguf
          key: qwen-2b-ud-q4-xl-v1
          restore-keys: |
            qwen-2b-ud-q4-xl-v1
            qwen-model-
            
      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python bot.py
