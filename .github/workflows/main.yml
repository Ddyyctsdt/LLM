name: Qwen Telegram Bot (Model Ready Menu)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'   # هر ۶ ساعت یکبار (10 دقیقه خاموشی)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install python-telegram-bot llama-cpp-python requests
      - name: Cache model (optional)
        uses: actions/cache@v4
        with:
          path: ./model.gguf
          key: qwen-model-v1
          restore-keys: qwen-model-v1-
      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python bot.py
